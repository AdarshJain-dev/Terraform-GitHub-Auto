name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .  # Change this if your .tf files are in a subdirectory

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Terraform ────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 3. Configure AWS credentials from GitHub Secrets ─────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 4. Terraform Init ─────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init

      # ── 5. Terraform Format Check ─────────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true   # warns but does not fail the pipeline

      # ── 6. Terraform Validate ─────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── 7. Terraform Plan (runs on every push & PR) ───────────────────────
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}

      # ── 8. Terraform Apply (only on push to main) ─────────────────────────
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
